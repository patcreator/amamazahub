name: Auto Deploy to amamazahub.com

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Deploy via FTP
        uses: milanmk/actions-file-deployer@master
        with:
          remote-protocol: ftp
          remote-host: ${{ secrets.FTP_HOST }}
          remote-port: 21
          remote-user: ${{ secrets.FTP_USERNAME }}
          remote-password: ${{ secrets.FTP_PASSWORD }}
          local-path: ./
          remote-path: /amamazahub.com/
          sync: delta